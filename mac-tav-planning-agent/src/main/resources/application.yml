server:
  port: 18082

mactav:
  agents:
    planning:
      enabled: true
      run-limit: 8
      prompt-path: prompts/planning-agent-prompt.md
      manual-model-validation-enabled: false

spring:
  ai:
    dashscope:
      api-key: ${ALI_API_KEY:}
      chat:
        options:
          model: qwen-plus
    alibaba:
      a2a:
        nacos:
          server-addr: 127.0.0.1:18848
          username: nacos
          password: nacos
          discovery:
            enabled: false
          registry:
            enabled: true
        server:
          version: 1.0.0
          card:
            name: PlanningAgent
            description: MAC-TAV network planning and topology design agent
            capabilities:
              streaming: false
              push-notifications: false
              state-transition-history: false
              extensions: []
            provider:
              name: MAC-TAV
              organization: yali
              url: http://127.0.0.1:18082
