server:
  port: 18083

mactav:
  agents:
    configuration:
      enabled: true
      run-limit: 8
      prompt-path: prompts/configuration-agent-prompt.md
      manual-model-validation-enabled: false

spring:
  ai:
    dashscope:
      api-key: ${SPRING_AI_DASHSCOPE_API_KEY:${ALI_API_KEY:${DASHSCOPE_API_KEY:${aliApi-key:}}}}
      chat:
        options:
          model: qwen-plus
      embedding:
        options:
          model: text-embedding-v4
    alibaba:
      a2a:
        nacos:
          server-addr: ${NACOS_ADDRESS:127.0.0.1:18848}
          username: ${NACOS_USERNAME:nacos}
          password: ${NACOS_PASSWORD:nacos}
          discovery:
            enabled: false
          registry:
            enabled: true
        server:
          version: 1.0.0
          card:
            name: ConfigurationAgent
            description: MAC-TAV structured network configuration generation agent
            capabilities:
              streaming: false
              push-notifications: false
              state-transition-history: false
              extensions: []
            provider:
              name: MAC-TAV
              organization: yali
              url: http://127.0.0.1:18083
    vectorstore:
      qdrant:
        host: ${QDRANT_HOST:127.0.0.1}
        port: ${QDRANT_PORT:16334}
        collection-name: ${QDRANT_COLLECTION_NAME:mactav_huawei_command_kb}
        use-tls: ${QDRANT_USE_TLS:false}
        initialize-schema: ${QDRANT_INITIALIZE_SCHEMA:true}
