server:
  port: 18083

mactav:
  agents:
    configuration:
      enabled: true
      run-limit: 8
      prompt-path: prompts/configuration-agent-prompt.md
      manual-model-validation-enabled: false

spring:
  ai:
    dashscope:
      api-key: ${SPRING_AI_DASHSCOPE_API_KEY:${ALI_API_KEY:${DASHSCOPE_API_KEY:${aliApi-key:}}}}
      chat:
        options:
          model: qwen-plus
      embedding:
        options:
          model: text-embedding-v4
    alibaba:
      a2a:
        nacos:
          server-addr: 127.0.0.1:18848
          username: nacos
          password: nacos
          discovery:
            enabled: false
          registry:
            enabled: true
        server:
          version: 1.0.0
          card:
            name: ConfigurationAgent
            description: MAC-TAV structured network configuration generation agent
            provider:
              name: MAC-TAV
              organization: yali
              url: http://127.0.0.1:18083
    vectorstore:
      qdrant:
        host: 127.0.0.1
        port: 16334
        collection-name: mactav_huawei_command_kb
        use-tls: false
        initialize-schema: true
