mactav:
  agents:
    intent:
      enabled: true
      run-limit: 6
      prompt-path: prompts/intent-agent-prompt.md
      manual-model-validation-enabled: false
  agent-card:
    intent:
      publish-enabled: true
      nacos-server-addr: ${MACTAV_NACOS_SERVER_ADDR:http://127.0.0.1:8848}
      nacos-group: MAC_TAV_AGENT_CARDS
      nacos-data-id: mactav.agent-card.IntentAgent.json
      service-host: ${INTENT_AGENT_HOST:127.0.0.1}
      service-port: ${INTENT_AGENT_PORT:18081}
      a2a-path: /internal/a2a/intent/invoke
      version: ${project.version:0.0.1-SNAPSHOT}

spring:
  ai:
    model:
      chat: dashscope
    dashscope:
      api-key: ${aliApi-key:}
      chat:
        options:
          model: ${DASHSCOPE_CHAT_MODEL:qwen-plus}

server:
  port: ${INTENT_AGENT_PORT:18081}
