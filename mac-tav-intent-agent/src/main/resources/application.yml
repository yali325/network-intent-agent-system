server:
  port: 18081

mactav:
  agents:
    intent:
      enabled: true
      run-limit: 6
      prompt-path: prompts/intent-agent-prompt.md
      manual-model-validation-enabled: false

spring:
  ai:
    dashscope:
      api-key: ${aliApi-key:}
      chat:
        options:
          model: qwen-plus
    alibaba:
      a2a:
        nacos:
          server-addr: 127.0.0.1:8848
          username: nacos
          password: nacos
          discovery:
            enabled: false
          registry:
            enabled: true
        server:
          version: 1.0.0
          card:
            name: IntentAgent
            description: MAC-TAV business intent extraction agent
            provider:
              name: MAC-TAV
              organization: yali
              url: http://127.0.0.1:18081
