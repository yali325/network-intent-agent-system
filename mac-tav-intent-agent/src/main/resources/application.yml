mactav:
  agents:
    intent:
      enabled: true
      run-limit: 6
      prompt-path: prompts/intent-agent-prompt.md
      manual-model-validation-enabled: false
  a2a:
    legacy:
      http-json:
        enabled: false

spring:
  ai:
    model:
      chat: dashscope
    dashscope:
      api-key: ${aliApi-key:}
      chat:
        options:
          model: ${DASHSCOPE_CHAT_MODEL:qwen-plus}
    alibaba:
      a2a:
        nacos:
          server-addr: 127.0.0.1:8848
          username: nacos
          password: nacos
          discovery:
            enabled: false
          registry:
            enabled: true
        server:
          version: 1.0.0
          card:
            name: IntentAgent
            description: MAC-TAV business intent extraction agent
            provider:
              name: MAC-TAV
              organization: yali
              url: http://127.0.0.1:${INTENT_AGENT_PORT:18081}

server:
  port: ${INTENT_AGENT_PORT:18081}
